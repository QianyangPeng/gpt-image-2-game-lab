<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marisa Kirisame — Fighter Training | gpt-image-2 demo</title>
<style>
  :root {
    --bg: #0b0816;
    --ink: #f4ecd8;
    --dim: #887aa0;
    --gold: #f9d36c;
    --violet: #8e6bdf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans SC", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 16px;
    overflow: hidden;
  }

  h1 {
    font-size: 15px; letter-spacing: 4px; color: var(--gold);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .subhead { color: var(--dim); font-size: 12px; margin-bottom: 12px; }

  #arena-wrap {
    position: relative;
    width: min(96vw, 960px);
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 0 3px #1f1a2e, 0 24px 80px rgba(0,0,0,0.8);
  }
  canvas#arena {
    display: block;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, #2a1a4a 0%, #3d2868 50%, #1a1024 100%);
  }

  /* HUD */
  #hud {
    position: absolute; top: 10px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    font-size: 12px;
  }
  .badge {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(249,211,108,0.2);
    padding: 5px 10px; border-radius: 6px;
    color: var(--ink); font-family: ui-monospace, monospace;
    letter-spacing: 0.5px;
  }
  .badge b { color: var(--gold); font-weight: normal; }

  /* Frame viewer (gallery mode) */
  #gallery-btn {
    pointer-events: auto; cursor: pointer;
    background: rgba(142, 107, 223, 0.15);
    border: 1px solid rgba(142, 107, 223, 0.5);
    color: var(--ink);
    padding: 5px 10px; border-radius: 6px;
    font-size: 12px; letter-spacing: 0.5px;
  }
  #gallery-btn:hover { background: rgba(142,107,223,0.3); }

  /* HP bars */
  .hp-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink); }
  .hp-label { min-width: 30px; color: var(--dim); letter-spacing: 1px; }

  .hp-fill { height: 100%; transition: width 0.2s ease; }
  .hp-num { min-width: 24px; font-variant-numeric: tabular-nums; color: var(--gold); font-family: ui-monospace, monospace; }
  /* Game over overlay */
  #game-over {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); z-index: 5; gap: 12px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9);

  #game-over-title { font-size: 48px; font-weight: bold; letter-spacing: 8px; color: var(--gold); }
  #game-over .sub { font-size: 16px; color: var(--ink); }
  #game-over.lose #game-over-title { color: #ff6868; }

  /* Variant tabs */
  .variants {
    display: flex; gap: 6px; margin-top: 10px; margin-bottom: 4px;
    justify-content: center; flex-wrap: wrap;
  }
  .variant {
    pointer-events: auto; cursor: pointer;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(249,211,108,0.15);
    color: var(--dim);
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; letter-spacing: 0.5px;

  .variant:hover { color: var(--ink); border-color: rgba(249,211,108,0.4); }
  .variant.active {
    background: rgba(249,211,108,0.15);
    color: var(--gold);
    border-color: var(--gold);
  }
  .variant small { display: block; color: var(--dim); font-size: 10px; margin-top: 2px; }
  .variant.active small { color: rgba(249,211,108,0.7); }

  /* Controls help */
  .controls {
    margin-top: 12px; font-size: 12px; color: var(--dim);
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    max-width: 900px; line-height: 1.8;
  }

    background: #241d35; padding: 2px 7px; border-radius: 4px;
    border: 1px solid #3f335a; font-family: ui-monospace, monospace;
    font-size: 11px; color: var(--ink);

  /* GALLERY overlay */

    position: fixed; inset: 0;
    background: rgba(10, 6, 20, 0.95);
    display: none; z-index: 20;
    overflow-y: auto; padding: 24px;
  }
  #gallery.show { display: block; }

    color: var(--gold); font-size: 16px; letter-spacing: 3px;
    text-align: center; margin-bottom: 16px;
  }
  #gallery .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; max-width: 1400px; margin: 0 auto;
  }
  #gallery .tile {
    background: #1a142a; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(249,211,108,0.1);
    padding: 8px;
  }
  #gallery .tile img {
    width: 100%; aspect-ratio: 1; object-fit: contain;
    background: repeating-conic-gradient(#2a2240 0 25%, #241d35 0 50%);
    background-size: 16px 16px;
  }
  #gallery .tile .label {
    font-size: 11px; color: var(--dim); padding: 6px 2px 2px;
    letter-spacing: 0.5px; font-family: ui-monospace, monospace;
  }
  #gallery .close {
    position: fixed; top: 18px; right: 24px; z-index: 21;
    background: rgba(142,107,223,0.3); border: 1px solid var(--violet);
    color: var(--ink); padding: 8px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px;
  }

  /* LOADING */
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); color: var(--gold); font-size: 14px;
    letter-spacing: 3px; z-index: 15;
  }
  #loading.hidden { display: none; }
  #loading .bar {
    margin-left: 12px; width: 160px; height: 4px;
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  #loading .bar .fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s; }

<script>
'use strict';

// --- Assets ---
// Shared frames (non-walk) are the same across all variants — only walk_1..4 differ.
const SHARED_FRAMES = [
  { key: 'idle_ref',    file: '01_idle_front_ref.png',     label: 'idle_ref (正面立绘)' },
  { key: 'idle_a',      file: '02_idle_breath_a.png',      label: 'idle_breath_a' },
  { key: 'idle_b',      file: '03_idle_breath_b.png',      label: 'idle_breath_b' },
  { key: 'slash_1',     file: '08_broom_slash_windup.png', label: 'broom slash windup' },
  { key: 'slash_2',     file: '09_broom_slash_strike.png', label: 'broom slash strike' },
  { key: 'slash_3',     file: '10_broom_slash_recover.png',label: 'broom slash recover' },
  { key: 'spark_1',     file: '11_master_spark_charge.png',label: 'master spark charge' },
  { key: 'spark_2',     file: '12_master_spark_fire.png',  label: 'master spark FIRE' },
  { key: 'spark_3',     file: '13_master_spark_recover.png',label: 'master spark recover' },
  { key: 'hurt',        file: '14_hurt.png',               label: 'hurt' },
];

// Walk variants: each provides its own frame set. Can be 4 or more frames.
function rangeFiles(dir, prefix, n, pad=1, start=1) {
  const out = [];
  for (let i = start; i < start + n; i++) {
    out.push({ key: `walk_${i}`, file: `${dir}/${prefix}${String(i).padStart(pad, '0')}.png` });
  }
  return out;
}

const WALK_VARIANTS = {
  original: [
    { key: 'walk_1', file: 'sprites/04_walk_1.png' },
    { key: 'walk_2', file: 'sprites/05_walk_2.png' },
    { key: 'walk_3', file: 'sprites/06_walk_3.png' },
    { key: 'walk_4', file: 'sprites/07_walk_4.png' },
  ],
  A: rangeFiles('experiments/A_skeleton_cond/alpha', 'walk_', 4),
  B: rangeFiles('experiments/B_sprite_strip/alpha', 'walk_', 4),
  C_keyframe: rangeFiles('experiments/C_knight_pixel/frames_raw', 'walk_', 8),
  C_flow: (() => {
    const out = [];
    for (let i = 0; i < 32; i++) {
      out.push({ key: `walk_${i+1}`, file: `experiments/C_knight_pixel/interp_flow/frame_${String(i).padStart(3,'0')}.png` });
    }
    return out;
  })(),
  C_xfade: (() => {
    const out = [];
    for (let i = 0; i < 32; i++) {
      out.push({ key: `walk_${i+1}`, file: `experiments/C_knight_pixel/interp_crossfade/frame_${String(i).padStart(3,'0')}.png` });
    }
    return out;
  })(),
};

// All frame files for the gallery view.
const FRAME_FILES = SHARED_FRAMES.slice(0, 3).concat(
  WALK_VARIANTS.original.map((f, i) => ({ key: f.key, file: f.file.replace('sprites/', ''), label: `walk ${i+1}/4` }))
).concat(SHARED_FRAMES.slice(3));

const sprites = {};
let currentVariant = 'original';
const SPRITE_DIR = 'sprites/';

function loadImg(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

// --- Animation data ---
const ANIM = {
  idle:   { frames: ['idle_a', 'idle_b'],             fps: 1.5,  loop: true },
  walk:   { frames: ['walk_1','walk_2','walk_3','walk_4'], fps: 8, loop: true },  // dynamic, rebuilt by setWalkVariant
  slash:  { frames: ['slash_1','slash_2','slash_3'],  fps: 8,   loop: false, frameDurs: [180, 140, 260], recovers_in: 620 },
  spark:  { frames: ['spark_1','spark_2','spark_3'],  fps: 2,    loop: false, frameDurs: [500, 1200, 600], recovers_in: 2350 },
  hurt:   { frames: ['hurt'],                         fps: 1,    loop: false, recovers_in: 600 },
};

// Per-variant walk fps: denser interpolated sets play faster to keep cycle duration roughly constant.
const WALK_FPS = { original: 8, A: 8, B: 8, C_keyframe: 12, C_flow: 32, C_xfade: 32 };

// ============================================================================
// D variant: puppet rig. 1 side-view knight image -> 12 body parts -> bones.
// ============================================================================

class PuppetRig {
  constructor(skeletonJson, spriteMap, animations) {
    this.bones = skeletonJson.skeleton;
    this.pelvisAnchor = skeletonJson.pelvis_anchor || [510, 640];
    this.sprites = spriteMap;
    this.animations = animations;
    this.bonesByName = Object.fromEntries(this.bones.map(b => [b.name, b]));
  }

  poseAt(animName, localT) {
    const anim = this.animations[animName];
    if (!anim) return {};
    const loop = anim.loop !== false;
    const kfs = anim.keyframes;
    let phase;
    if (loop) {
      phase = (localT % anim.duration) / anim.duration;
    } else {
      // Non-looping: clamp to final keyframe when past duration
      phase = Math.min(localT / anim.duration, 0.999);
    }
    let k0, k1, t0, t1;
    for (let i = 0; i < kfs.length; i++) {
      const next = (i + 1) % kfs.length;
      const nextT = i === kfs.length - 1
        ? (loop ? kfs[next].t + 1 : 1.0)
        : kfs[next].t;
      if (phase >= kfs[i].t && phase < nextT) {
        k0 = kfs[i]; k1 = kfs[next]; t0 = k0.t; t1 = nextT;
        if (!loop && i === kfs.length - 1) { k1 = k0; t1 = t0 + 0.001; }
        break;
      }
    }
    if (!k0) { k0 = kfs[0]; k1 = kfs[1] || kfs[0]; t0 = k0.t; t1 = k1.t; }
    const alpha = t1 === t0 ? 0 : (phase - t0) / (t1 - t0);
    const pose = {};
    const boneSet = new Set([...Object.keys(k0.pose), ...Object.keys(k1.pose)]);
    for (const name of boneSet) {
      const a = k0.pose[name] ?? 0;
      const b = k1.pose[name] ?? 0;
      pose[name] = a + (b - a) * alpha;
    }
    pose.__pelvis_dy = (k0.pose.__pelvis_dy ?? 0) + ((k1.pose.__pelvis_dy ?? 0) - (k0.pose.__pelvis_dy ?? 0)) * alpha;
    return pose;
  }

  worldMatrix(boneName, pose, cache) {
    if (cache[boneName]) return cache[boneName];
    const bone = this.bonesByName[boneName];
    let m = bone.parent ? new DOMMatrix(this.worldMatrix(bone.parent, pose, cache)) : new DOMMatrix();
    let ox = bone.offset[0], oy = bone.offset[1];
    if (bone.name === 'pelvis') {
      oy += pose.__pelvis_dy || 0;
    }
    m.translateSelf(ox, oy);
    m.rotateSelf(pose[bone.name] || 0);
    cache[boneName] = m;
    return m;
  }

  render(ctx, animName, t, opts = {}) {
    const { x = 0, y = 0, facing = 1, scale = 1, debug = false } = opts;
    const pose = this.poseAt(animName, t);
    const cache = {};
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(facing * scale, scale);
    const ordered = [...this.bones].sort((a, b) => (a.z || 0) - (b.z || 0));
    for (const bone of ordered) {
      const m = this.worldMatrix(bone.name, pose, cache);
      const img = this.sprites[bone.name];
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.save();
        ctx.transform(m.a, m.b, m.c, m.d, m.e, m.f);
        const ss = bone.sprite_scale || 1;
        if (ss !== 1) {
          ctx.drawImage(img, -bone.pivot[0], -bone.pivot[1],
                        img.naturalWidth * ss, img.naturalHeight * ss);
        } else {
          ctx.drawImage(img, -bone.pivot[0], -bone.pivot[1]);
        }
        ctx.restore();
      }
      if (debug) {
        ctx.save();
        ctx.transform(m.a, m.b, m.c, m.d, m.e, m.f);
        ctx.fillStyle = '#f9d36c';
        ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }
}

// Walk-cycle animation keyframes (front-ish 3/4 view).
// Angles are in degrees. __pelvis_dy shifts pelvis vertically for body bob.
const KNIGHT_WALK = {
  duration: 0.8,
  keyframes: [
    { t: 0.0, pose: {
        __pelvis_dy: 0,
        front_thigh: -22, front_shin: 18,
        back_thigh:  22, back_shin: -25,
        front_upper_arm: 18, front_forearm: -10,
        back_upper_arm: -18, back_forearm: 8,
        torso: -2, head: 2, cape: -8, sword: 0,
    }},
    { t: 0.25, pose: {
        __pelvis_dy: -6,
        front_thigh: 0, front_shin: -5,
        back_thigh:  0, back_shin: -5,
        front_upper_arm: 0, front_forearm: 0,
        back_upper_arm: 0, back_forearm: 0,
        torso: 0, head: 0, cape: 0, sword: 0,
    }},
    { t: 0.5, pose: {
        __pelvis_dy: 0,
        front_thigh: 22, front_shin: -25,
        back_thigh: -22, back_shin: 18,
        front_upper_arm: -18, front_forearm: 8,
        back_upper_arm: 18, back_forearm: -10,
        torso: 2, head: -2, cape: 8, sword: 0,
    }},
    { t: 0.75, pose: {
        __pelvis_dy: -6,
        front_thigh: 0, front_shin: -5,
        back_thigh:  0, back_shin: -5,
        front_upper_arm: 0, front_forearm: 0,
        back_upper_arm: 0, back_forearm: 0,
        torso: 0, head: 0, cape: 0, sword: 0,
    }},
  ],
};

const KNIGHT_IDLE = {
  duration: 2.0, loop: true,
  keyframes: [
    { t: 0,   pose: { __pelvis_dy: 0, torso: 0, head: 0, cape: 0 } },
    { t: 0.5, pose: { __pelvis_dy: -3, torso: 1, head: -1, cape: -3 } },
    { t: 1,   pose: { __pelvis_dy: 0, torso: 0, head: 0, cape: 0 } },
  ],
};

// Sword slash. Non-looping. Front arm raises behind head (windup), sweeps forward
// and down (strike), settles (recover). Torso twists, head ducks at impact.
const KNIGHT_ATTACK = {
  duration: 0.55, loop: false,
  keyframes: [
    { t: 0.0,  pose: {
        front_upper_arm: 0,   front_forearm: 0,   sword: 0,
        torso: 0, head: 0,
        front_thigh: 0, front_shin: 0, back_thigh: 0, back_shin: 0,
    }},
    { t: 0.3,  pose: {   // windup — arm raised high
        front_upper_arm: -115, front_forearm: -40, sword: -10,
        torso: 6, head: -4,
        front_thigh: -5, front_shin: 5, back_thigh: 8, back_shin: -10,
    }},
    { t: 0.55, pose: {   // strike — arm swept forward/down
        front_upper_arm: 55, front_forearm: 15, sword: -40,
        torso: -10, head: 8,
        front_thigh: 4, front_shin: -5, back_thigh: -8, back_shin: 10,
    }},
    { t: 0.85, pose: {   // recovery
        front_upper_arm: 20, front_forearm: 5, sword: -15,
        torso: -4, head: 3,
    }},
    { t: 1.0,  pose: {
        front_upper_arm: 0, front_forearm: 0, sword: 0,
        torso: 0, head: 0,
    }},
  ],
};

// Jump. Four discrete phases, selected by game code (not time). So we give each
// phase t=0 start and t=1 end so any sampling of its phase shows that pose.
// We'll use four short loopable micro-animations.
const KNIGHT_JUMP_ASCEND = {
  duration: 0.25, loop: false,
  keyframes: [
    { t: 0,   pose: {
        __pelvis_dy: 0,
        front_thigh: -30, front_shin: 45, back_thigh: -25, back_shin: 40,
        front_upper_arm: -20, front_forearm: 15, back_forearm: -8,
        torso: -4, head: 2, cape: 12,
    }},
    { t: 1.0, pose: {
        front_thigh: -30, front_shin: 45, back_thigh: -25, back_shin: 40,
        front_upper_arm: -20, front_forearm: 15, back_forearm: -8,
        torso: -4, head: 2, cape: 12,
    }},
  ],
};
const KNIGHT_JUMP_FALL = {
  duration: 0.25, loop: false,
  keyframes: [
    { t: 0, pose: {
        front_thigh: -10, front_shin: 25, back_thigh: -5, back_shin: 20,
        front_upper_arm: 10, front_forearm: -5, back_forearm: 5,
        torso: 4, head: -2, cape: -5,
    }},
    { t: 1, pose: {
        front_thigh: -10, front_shin: 25, back_thigh: -5, back_shin: 20,
        front_upper_arm: 10, front_forearm: -5, back_forearm: 5,
        torso: 4, head: -2, cape: -5,
    }},
  ],
};
const KNIGHT_JUMP_LAND = {
  duration: 0.25, loop: false,
  keyframes: [
    { t: 0,   pose: { __pelvis_dy: 12, front_thigh: 8, front_shin: -25, back_thigh: 8, back_shin: -25, torso: -6, head: 3 } },
    { t: 0.5, pose: { __pelvis_dy: 6,  front_thigh: 4, front_shin: -10, back_thigh: 4, back_shin: -10, torso: -3, head: 1 } },
    { t: 1,   pose: { __pelvis_dy: 0, front_thigh: 0, front_shin: 0, back_thigh: 0, back_shin: 0, torso: 0, head: 0 } },
  ],
};

// Block — raises shield (back_forearm rotates forward). Loops while held.
const KNIGHT_BLOCK = {
  duration: 0.2, loop: true,
  keyframes: [
    { t: 0, pose: {
        back_upper_arm: 45, back_forearm: 35, shield: 0,
        torso: -3, head: 2,
        front_upper_arm: -8, front_forearm: 5,
    }},
    { t: 1, pose: {
        back_upper_arm: 45, back_forearm: 35, shield: 0,
        torso: -3, head: 2,
        front_upper_arm: -8, front_forearm: 5,
    }},
  ],
};

// Dash — quick forward lunge. Body leans forward, legs extend.
const KNIGHT_DASH = {
  duration: 0.3, loop: false,
  keyframes: [
    { t: 0, pose: {
        __pelvis_dy: 0,
        front_thigh: 0, front_shin: 0, back_thigh: 0, back_shin: 0,
        torso: 0, head: 0,
    }},
    { t: 0.4, pose: {
        __pelvis_dy: -4,
        front_thigh: -35, front_shin: 25,
        back_thigh:  25, back_shin: -30,
        front_upper_arm: 30, front_forearm: -15,
        back_upper_arm: -20, back_forearm: 10,
        torso: -10, head: 5, cape: 15,
    }},
    { t: 1, pose: {
        __pelvis_dy: 0,
        front_thigh: -20, front_shin: 10, back_thigh: 15, back_shin: -15,
        torso: -3, head: 2,
    }},
  ],
};

// Cast — raise sword overhead, charge up. Like a victory/charge pose.
const KNIGHT_CAST = {
  duration: 0.9, loop: false,
  keyframes: [
    { t: 0,   pose: { front_upper_arm: 0, front_forearm: 0, sword: 0, torso: 0, head: 0 } },
    { t: 0.4, pose: {
        front_upper_arm: -160, front_forearm: -20, sword: 10,
        torso: -5, head: -8, cape: 5,
    }},
    { t: 0.8, pose: {
        front_upper_arm: -160, front_forearm: -20, sword: 10,
        torso: -5, head: -8, cape: 5,
    }},
    { t: 1, pose: { front_upper_arm: 0, front_forearm: 0, sword: 0, torso: 0, head: 0 } },
  ],
};

// Hurt reaction (0.45s). Head back, arms out, staggered.
const KNIGHT_HURT = {
  duration: 0.5, loop: false,
  keyframes: [
    { t: 0, pose: {
        torso: 0, head: 0, front_upper_arm: 0, back_forearm: 0,
    }},
    { t: 0.25, pose: {
        torso: 12, head: -15,
        front_upper_arm: -30, front_forearm: -20,
        back_forearm: 20,
        cape: 8,
    }},
    { t: 0.6, pose: {
        torso: 5, head: -5,
        front_upper_arm: -10, front_forearm: -5,
        back_forearm: 8,
        cape: 3,
    }},
    { t: 1, pose: {
        torso: 0, head: 0, front_upper_arm: 0, back_forearm: 0, cape: 0,
    }},
  ],
};

const RIG_PART_NAMES = [
  'cape', 'back_thigh', 'back_shin', 'back_upper_arm', 'back_forearm',
  'torso', 'head', 'front_thigh', 'front_shin', 'front_upper_arm',
  'front_forearm', 'sword',
];

let knightRig = null;
async function loadKnightRig() {
  if (knightRig) return knightRig;
  const skel = await fetch('experiments/D_puppet_rig/skeleton.json').then(r => r.json());
  const sprites = {};
  await Promise.all(RIG_PART_NAMES.map(async name => {
    sprites[name] = await loadImg(`experiments/D_puppet_rig/parts/${name}.png`);
  }));
  knightRig = new PuppetRig(skel, sprites, {
    walk: KNIGHT_WALK, idle: KNIGHT_IDLE, attack: KNIGHT_ATTACK,
    jump_ascend: KNIGHT_JUMP_ASCEND, jump_fall: KNIGHT_JUMP_FALL, jump_land: KNIGHT_JUMP_LAND,
    hurt: KNIGHT_HURT, block: KNIGHT_BLOCK, dash: KNIGHT_DASH, cast: KNIGHT_CAST,
  });
  return knightRig;
}

// E variant: parts generated DIRECTLY by gpt-image-2 as an asset sheet.
// Many bones share one sprite (back limbs reuse front limb sprites).
let knightRigE = null;
async function loadKnightRigE() {
  if (knightRigE) return knightRigE;
  // v2: auto-computed offsets from detected joints + normalized per-part scales
  const skelData = await fetch('experiments/E_part_gen/skeleton_e2.json').then(r => r.json());
  // Load unique sprite files once, reuse per-bone by 'sprite' field
  const spriteNames = [...new Set(skelData.skeleton.filter(b => b.sprite).map(b => b.sprite))];
  const spriteImgs = {};
  await Promise.all(spriteNames.map(async n => {
    spriteImgs[n] = await loadImg(`experiments/E_part_gen/parts_e1/${n}.png`);
  }));
  // Build a sprites map keyed by BONE name (each bone may reuse a sprite)
  const boneSprites = {};
  for (const bone of skelData.skeleton) {
    if (bone.sprite) boneSprites[bone.name] = spriteImgs[bone.sprite];
  }
  knightRigE = new PuppetRig(
    { skeleton: skelData.skeleton, pelvis_anchor: [0, 0] },
    boneSprites,
    {
      walk: KNIGHT_WALK, idle: KNIGHT_IDLE, attack: KNIGHT_ATTACK,
      jump_ascend: KNIGHT_JUMP_ASCEND, jump_fall: KNIGHT_JUMP_FALL, jump_land: KNIGHT_JUMP_LAND,
      hurt: KNIGHT_HURT, block: KNIGHT_BLOCK, dash: KNIGHT_DASH, cast: KNIGHT_CAST,
    },
  );
  return knightRigE;
}

// --- State ---
const GAME_W = 1920, GAME_H = 1080;
const GROUND_Y = 900;
const state = {
  x: 500, y: GROUND_Y, vy: 0, onGround: true, facing: 1,
  animName: 'idle', frameIdx: 0, frameStartTime: 0, animStartTime: 0,
  animLocked: false, animEndTime: 0,
  // Combat
  hp: 100, blocking: false, invincible: false, gameOver: null,
  lastDash: 0, dashEnd: 0,
};
const GRAVITY = 1.1;
const JUMP_VY = -22;

const cv = document.getElementById('arena');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

// --- Keyboard ---
const KEYS = {};
addEventListener('keydown', e => {
  KEYS[e.code] = true;
  if (['ArrowLeft','ArrowRight','Space','KeyZ','KeyX','KeyC','KeyR','KeyA','KeyD',
       'KeyS','KeyF','KeyV','ShiftLeft','ShiftRight','ArrowDown'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup', e => { KEYS[e.code] = false; });

// --- Animation helpers ---
function setAnim(name, lock=false) {
  if (state.animName === name) return;
  state.animName = name;
  state.frameIdx = 0;
  state.animStartTime = performance.now();
  state.frameStartTime = state.animStartTime;
  state.animLocked = lock;
  // Auto-lock duration: prefer ANIM[name].recovers_in; for D_rig-only anims
  // (jump/fall/land/attack), fall back to duration from knight animations.
  let recovers = ANIM[name]?.recovers_in;
  if (!recovers && knightRig && knightRig.animations[name]) {
    const loop = knightRig.animations[name].loop !== false;
    if (!loop) recovers = knightRig.animations[name].duration * 1000;
  }
  // Attack in D_rig should lock; pass a default recovers for 'slash' when no Marisa anim
  if (lock && !recovers && (name === 'slash' || name === 'attack')) recovers = 550;
  if (lock && recovers) state.animEndTime = performance.now() + recovers;
}

function updateAnim(now) {
  const anim = ANIM[state.animName];
  if (anim) {
    // Flat-sprite animation (Marisa): advance frame index
    const dur = anim.frameDurs ? anim.frameDurs[state.frameIdx] : (1000 / anim.fps);
    if (now - state.frameStartTime >= dur) {
      state.frameStartTime += dur;
      state.frameIdx += 1;
      if (state.frameIdx >= anim.frames.length) {
        if (anim.loop) state.frameIdx = 0;
        else state.frameIdx = anim.frames.length - 1;
      }
    }
  }
  // D_rig animation has no frame-index concept; rig drives poses from localT continuously.
  // auto-unlock locked anims after recovery
  if (state.animLocked && now >= state.animEndTime) {
    state.animLocked = false;
    setAnim('idle', false);
  }
}

// --- Input handling ---
function handleInput(now) {
  // Jump always ignores animLocked if on ground (responsive)
  if (KEYS['Space'] && state.onGround) {
    state.vy = JUMP_VY; state.onGround = false;
    setAnim('jump', false);
  }
  if (state.animLocked) return;
  const left = KEYS['ArrowLeft'] || KEYS['KeyA'];
  const right = KEYS['ArrowRight'] || KEYS['KeyD'];
  // Block (hold S / ↓) -- while held, shield up. Exits when released.
  const blocking = (KEYS['KeyS'] || KEYS['ArrowDown']) && state.onGround;
  if (blocking) { setAnim('block', false); state.blocking = true; return; }
  else state.blocking = false;
  // Dash (Shift) -- short forward burst, invincible
  if ((KEYS['ShiftLeft'] || KEYS['ShiftRight']) && state.onGround && now - state.lastDash > 800) {
    state.lastDash = now;
    state.dashEnd = now + 300;
    state.invincible = true;
    state.x += state.facing * 60;   // impulse
    setAnim('dash', true);
    return;
  }
  if (KEYS['KeyZ']) { setAnim('slash', true); return; }
  if (KEYS['KeyF']) { setAnim('cast', true); return; }
  if (KEYS['KeyC']) { dealDamageToPlayer(15); return; }  // "take damage" test
  if (KEYS['KeyV']) { dealDamageToDummy(20); return; }   // "attack dummy" test
  if (KEYS['KeyR']) { resetCombat(); return; }
  if (!state.onGround) return;
  if (left) {
    state.facing = -1;
    state.x = Math.max(150, state.x - 4);
    setAnim('walk');
  } else if (right) {
    state.facing = 1;
    state.x = Math.min(GAME_W - 150, state.x + 4);
    setAnim('walk');
  } else {
    setAnim('idle');
  }
}

function dealDamageToPlayer(amount) {
  if (state.invincible || state.blocking) return;
  state.hp = Math.max(0, state.hp - amount);
  setAnim('hurt', true);
  state.invincible = true;
  setTimeout(() => { state.invincible = false; }, 500);
  if (state.hp <= 0) state.gameOver = 'lose';
}

function dealDamageToDummy(amount) {
  if (dummyScene.hp <= 0) return;
  dummyScene.hp = Math.max(0, dummyScene.hp - amount);
  dummyScene.dummyWobble = 18;
  dummyScene.hitFlash = 8;
  if (dummyScene.hp <= 0) state.gameOver = 'win';
}

function resetCombat() {
  state.x = 500; state.y = GROUND_Y; state.vy = 0; state.onGround = true;
  state.hp = 100; state.blocking = false; state.invincible = false; state.gameOver = null;
  dummyScene.hp = 100; dummyScene.hitFlash = 0;
  setAnim('idle', false);
}

function physics(dtMs) {
  if (!state.onGround) {
    state.vy += GRAVITY * (dtMs / 16.67);   // gravity per 60fps-equivalent frame
    state.y += state.vy * (dtMs / 16.67);
    // Switch jump -> fall when velocity turns positive
    if (state.vy > 0 && state.animName === 'jump') setAnim('fall', false);
    if (state.y >= GROUND_Y) {
      state.y = GROUND_Y;
      state.vy = 0;
      state.onGround = true;
      setAnim('land', true);
      state.animEndTime = performance.now() + 250;
    }
  }
}

// --- Drawing ---
const dummyScene = {
  dummyX: 1400, dummyWobble: 0, hp: 100, hitFlash: 0,
};

function drawBackground() {
  // Floor tiles
  ctx.fillStyle = '#241b3f';
  ctx.fillRect(0, GROUND_Y, GAME_W, GAME_H - GROUND_Y);
  // Stone grid
  ctx.strokeStyle = 'rgba(249,211,108,0.12)';
  ctx.lineWidth = 2;
  for (let x = 0; x < GAME_W; x += 120) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, GAME_H); ctx.stroke();
  }
  for (let y = GROUND_Y; y < GAME_H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_W, y); ctx.stroke();
  }
  // Floor highlight
  ctx.fillStyle = 'rgba(249,211,108,0.08)';
  ctx.fillRect(0, GROUND_Y, GAME_W, 4);

  // Distant magical orbs floating
  const t = performance.now() * 0.0005;
  for (let i = 0; i < 12; i++) {
    const ox = (i * 160 + Math.sin(t + i) * 30) % GAME_W;
    const oy = 200 + Math.sin(t * 2 + i * 1.3) * 60;
    const r = 6 + Math.sin(t * 3 + i) * 3;
    ctx.fillStyle = `rgba(249, 211, 108, ${0.3 + Math.sin(t * 4 + i) * 0.15})`;
    ctx.beginPath(); ctx.arc(ox, oy, r, 0, Math.PI * 2); ctx.fill();
  }
}

function drawDummy() {
  const x = dummyScene.dummyX, y = GROUND_Y;
  const wobble = Math.sin(performance.now() * 0.01) * dummyScene.dummyWobble;
  dummyScene.dummyWobble *= 0.95;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(wobble * 0.1);
  // post
  ctx.fillStyle = '#4a3220';
  ctx.fillRect(-10, -240, 20, 240);
  // head
  ctx.fillStyle = '#9a7240';
  ctx.fillRect(-55, -340, 110, 110);
  // torso sack
  ctx.fillStyle = '#c69968';
  ctx.fillRect(-70, -240, 140, 160);
  // face mark
  ctx.fillStyle = '#4a3220';
  ctx.fillRect(-32, -310, 16, 16);  // left eye
  ctx.fillRect(16, -310, 16, 16);   // right eye
  ctx.fillRect(-20, -272, 40, 6);   // mouth
  // target bullseye on torso
  ctx.strokeStyle = '#c63b30';
  ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(0, -170, 34, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#c63b30';
  ctx.beginPath(); ctx.arc(0, -170, 10, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawMarisa() {
  // Rig variant renders via PuppetRig, not the flat-sprite path.
  const rig = (currentVariant === 'D_rig') ? knightRig
            : (currentVariant === 'E_rig') ? knightRigE
            : null;
  if (rig) {
    let rigAnim = 'idle';
    if (state.animName === 'walk') rigAnim = 'walk';
    else if (state.animName === 'slash' || state.animName === 'spark') rigAnim = 'attack';
    else if (state.animName === 'hurt') rigAnim = 'hurt';
    else if (state.animName === 'jump') rigAnim = 'jump_ascend';
    else if (state.animName === 'fall') rigAnim = 'jump_fall';
    else if (state.animName === 'land') rigAnim = 'jump_land';
    const localT = (performance.now() - state.animStartTime) / 1000;
    // E rig v2 normalizes parts to TARGET_H=800 so its assembled character is
    // ~800 px tall. Render at scale to get ~540 on screen.
    const SCALE = currentVariant === 'E_rig' ? 0.70 : 0.65;
    // Distance from pelvis origin to feet in the v2 rig's local coords =
    // thigh.height + shin.height ≈ 176 + 176 = 352 (target pixels).
    const FEET_TO_PELVIS_SCALED = currentVariant === 'E_rig' ? Math.round(352 * 0.70) : 188;
    const pelvisScreenY = state.y - FEET_TO_PELVIS_SCALED;
    rig.render(ctx, rigAnim, localT, {
      x: state.x, y: pelvisScreenY, facing: state.facing, scale: SCALE,
    });
    return;
  }

  // Non-D_rig variants (Marisa sprites) don't have jump/fall/land frames -- fall back to idle
  const animKey = ANIM[state.animName] ? state.animName : 'idle';
  const anim = ANIM[animKey];
  const frameKey = anim.frames[Math.min(state.frameIdx, anim.frames.length - 1)];
  const img = sprites[frameKey];
  if (!img) return;

  // Common anchor for all 1024x1024 frames: feet at ~85% down the source canvas.
  const SRC_SIZE = 1024;
  const SRC_FEET_Y = SRC_SIZE * 0.95;   // near the bottom of canvas
  const SRC_CENTER_X = SRC_SIZE * 0.5;
  const SCALE = 640 / SRC_SIZE;

  const drawW = SRC_SIZE * SCALE;
  const drawH = SRC_SIZE * SCALE;
  const anchorX = state.x;
  const anchorY = state.y;
  const dx = anchorX - SRC_CENTER_X * SCALE;
  const dy = anchorY - SRC_FEET_Y * SCALE;

  ctx.save();
  if (state.facing < 0) {
    ctx.translate(anchorX, 0);
    ctx.scale(-1, 1);
    ctx.translate(-anchorX, 0);
  }
  ctx.drawImage(img, dx, dy, drawW, drawH);
  ctx.restore();

  // Master spark beam extension (extra juice beyond the sprite edge, only during frame 2 of spark)
  if (state.animName === 'spark' && state.frameIdx === 1) {
    const beamY = state.y - 270;
    const beamStartX = state.x + state.facing * 100;
    const beamEndX = state.x + state.facing * 2000;
    const grad = ctx.createLinearGradient(beamStartX, beamY, beamEndX, beamY);
    grad.addColorStop(0, 'rgba(255, 245, 180, 1)');
    grad.addColorStop(0.3, 'rgba(249, 211, 108, 0.9)');
    grad.addColorStop(1, 'rgba(249, 211, 108, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(Math.min(beamStartX, beamEndX), beamY - 120, Math.abs(beamEndX - beamStartX), 240);
    // core line
    const gradCore = ctx.createLinearGradient(beamStartX, beamY, beamEndX, beamY);
    gradCore.addColorStop(0, 'rgba(255,255,255,1)');
    gradCore.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradCore;
    ctx.fillRect(Math.min(beamStartX, beamEndX), beamY - 30, Math.abs(beamEndX - beamStartX), 60);
    // Dummy gets hit
    if (Math.abs(state.x - dummyScene.dummyX) < 1800 && state.facing === 1) {
      dummyScene.dummyWobble = 15;
    }
  }
}

// --- Hit detection ---
// For rig variants, use animation phase (localT) to pick the strike window.
// For flat-sprite variants, keep the frame-index check.
let _lastHitAttackStart = -1;
function checkHit() {
  // Register a hit ONCE per attack — on the first tick we see slash with an
  // animStartTime we haven't processed yet. Don't depend on animation phase
  // (tab-throttling can make us miss the window).
  if (state.animName === 'slash' && _lastHitAttackStart !== state.animStartTime) {
    _lastHitAttackStart = state.animStartTime;
    const reach = state.facing * 250;
    if (Math.abs(state.x + reach - dummyScene.dummyX) < 220) {
      dealDamageToDummy(20);
    }
  }
}

// --- HUD update ---
const $go = document.getElementById('game-over');
const $goTitle = document.getElementById('game-over-title');
function updateHud() {
  document.getElementById('state-label').textContent = state.animName +
    (state.animLocked ? ' (locked)' : '') + (state.blocking ? ' + blocking' : '') + (state.invincible ? ' + i-frames' : '');
  document.getElementById('hp-player').style.width = state.hp + '%';
  document.getElementById('hp-dummy').style.width  = dummyScene.hp + '%';
  document.getElementById('hp-player-num').textContent = state.hp;
  document.getElementById('hp-dummy-num').textContent  = dummyScene.hp;
  if (state.gameOver) {
    $go.style.display = 'flex';
    $go.classList.toggle('lose', state.gameOver === 'lose');
    $goTitle.textContent = state.gameOver === 'win' ? '胜利！' : '阵亡…';
  } else {
    $go.style.display = 'none';
  }
}

// --- Main loop ---
let lastFrameTime = 0;
function loop() {
  const now = performance.now();
  const dtMs = lastFrameTime ? Math.min(50, now - lastFrameTime) : 16.67;
  lastFrameTime = now;
  handleInput(now);
  physics(dtMs);
  updateAnim(now);
  checkHit();

  ctx.clearRect(0, 0, GAME_W, GAME_H);
  drawBackground();
  drawDummy();
  drawMarisa();
  updateHud();
  requestAnimationFrame(loop);
}

// --- Gallery ---
document.getElementById('gallery-btn').addEventListener('click', () => {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = FRAME_FILES.map((f, i) => `
    <div class="tile">
      <img src="${SPRITE_DIR + f.file}" alt="${f.label}" />
      <div class="label">${String(i+1).padStart(2,'0')} · ${f.label}</div>
    </div>
  `).join('');
  document.getElementById('gallery').classList.add('show');
});

// --- Variant swap ---
async function loadWalkVariant(name) {
  currentVariant = name;
  document.querySelectorAll('.variant').forEach(b => {
    b.classList.toggle('active', b.dataset.variant === name);
  });
  if (name === 'D_rig') {
    await loadKnightRig();
    state.frameIdx = 0;
    return;
  }
  if (name === 'E_rig') {
    await loadKnightRigE();
    state.frameIdx = 0;
    return;
  }
  const frames = WALK_VARIANTS[name];
  if (!frames) return;
  Object.keys(sprites).filter(k => k.startsWith('walk_')).forEach(k => delete sprites[k]);
  await Promise.all(frames.map(async (f) => {
    const img = await loadImg(f.file);
    sprites[f.key] = img;
  }));
  ANIM.walk.frames = frames.map(f => f.key);
  ANIM.walk.fps = WALK_FPS[name] || 8;
  state.frameIdx = 0;
  state.frameStartTime = performance.now();
}

document.querySelectorAll('.variant').forEach(btn => {
  btn.addEventListener('click', () => loadWalkVariant(btn.dataset.variant));
});

// --- Boot ---
async function boot() {
  const fill = document.getElementById('load-fill');
  // Load shared frames from /sprites/
  const sharedTasks = SHARED_FRAMES.map(async (f) => {
    const img = await loadImg(SPRITE_DIR + f.file);
    sprites[f.key] = img;
  });
  // Load default (original) walk variant
  const walkTasks = WALK_VARIANTS.original.map(async (f) => {
    const img = await loadImg(f.file);
    sprites[f.key] = img;
  });
  const all = sharedTasks.concat(walkTasks);
  let loaded = 0;
  all.forEach(p => p.then(() => { loaded += 1; fill.style.width = (loaded / all.length * 100) + '%'; }));
  await Promise.all(all);
  document.getElementById('loading').classList.add('hidden');
  loop();
}
boot();
</script>
